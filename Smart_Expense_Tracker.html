
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
gap:20px;
}

.header h1{
font-size:42px;
color:#38bdf8;
}

.balance-card{
background:linear-gradient(135deg,#38bdf8,#6366f1);
padding:25px;
border-radius:20px;
width:320px;
box-shadow:0 10px 30px rgba(56,189,248,0.3);
}

.balance-card h2{
font-size:18px;
margin-bottom:10px;
}

.balance-card h1{
font-size:42px;
color:white;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.card h2{
margin-bottom:20px;
color:#38bdf8;
}

.form-group{
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#38bdf8;
color:#0f172a;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(56,189,248,0.4);
}

.transaction{
background:#1e293b;
padding:16px;
border-radius:14px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fadeIn 0.4s ease;
}

.transaction small{
color:#94a3b8;
}

.income{
color:#22c55e;
font-weight:600;
}

.expense{
color:#ef4444;
font-weight:600;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.summary-card{
padding:20px;
border-radius:18px;
text-align:center;
}

.summary-card h3{
margin-bottom:10px;
}

.summary-card p{
font-size:28px;
font-weight:700;
}

.green{
background:rgba(34,197,94,0.15);
}

.red{
background:rgba(239,68,68,0.15);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Smart Expense Tracker</h1>

<div class="balance-card">
<h2>Total Balance</h2>
<h1 id="balance">₹0</h1>
</div>
</div>

<div class="grid">

<div class="card">
<h2>Add Transaction</h2>

<div class="form-group">
<input type="text" id="title" placeholder="Enter Transaction Title">
</div>

<div class="form-group">
<input type="number" id="amount" placeholder="Enter Amount">
</div>

<div class="form-group">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
</div>

<button onclick="addTransaction()">Add Transaction</button>

<div class="summary">

<div class="summary-card green">
<h3>Total Income</h3>
<p id="income">₹0</p>
</div>

<div class="summary-card red">
<h3>Total Expense</h3>
<p id="expense">₹0</p>
</div>

</div>
</div>

<div class="card">
<h2>Transaction History</h2>

<div id="transactions"></div>

</div>

</div>

</div>

<script>
let balance = 0;
let totalIncome = 0;
let totalExpense = 0;

function addTransaction(){

const title = document.getElementById('title').value;
const amount = parseInt(document.getElementById('amount').value);
const type = document.getElementById('type').value;

if(title === '' || isNaN(amount)){
alert('Please fill all fields');
return;
}

const transactionDiv = document.createElement('div');
transactionDiv.classList.add('transaction');

if(type === 'income'){
transactionDiv.innerHTML = `
<div>
<h4>${title}</h4>
<small>Income</small>
</div>
<div class="income">+ ₹${amount}</div>
`;

balance += amount;
totalIncome += amount;

}else{

transactionDiv.innerHTML = `
<div>
<h4>${title}</h4>
<small>Expense</small>
</div>
<div class="expense">- ₹${amount}</div>
`;

balance -= amount;
totalExpense += amount;
}

document.getElementById('transactions').prepend(transactionDiv);

document.getElementById('balance').innerText = `₹${balance}`;
document.getElementById('income').innerText = `₹${totalIncome}`;
document.getElementById('expense').innerText = `₹${totalExpense}`;

document.getElementById('title').value = '';
document.getElementById('amount').value = '';
}
</script>

</body>
</html>
